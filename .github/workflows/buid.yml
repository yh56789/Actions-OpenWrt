# ImmortalWrt 自动编译 - 固定版本 24.10.5 / 内核 6.6.122
name: Build ImmortalWrt 24.10.5

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检查服务器配置
        run: |
          echo "CPU 核心数：$(nproc)"
          free -h
          df -h

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip libpython3-dev qemu-utils \
          rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: 克隆源码 - 固定 v24.10.5 标签
        run: |
          git clone -b v24.10.5 --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt

      - name: 上传自定义配置文件 (config.seed)
        uses: actions/upload-artifact@v4
        with:
          name: config.seed
          path: immortalwrt/.config

      - name: 更新 feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 自定义配置菜单（在这里修改你的机型）
        run: |
          cd immortalwrt
          # ========== 在这里修改你的机型配置 ==========
          # 示例：x86_64 通用机型
          cat > .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          # 你可以在这里追加更多 LuCI 插件配置
          EOF

          # 加载配置
          make defconfig

      - name: 下载依赖包
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: 开始编译固件
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: 检查编译错误
        if: ${{ failure() }}
        run: |
          cd immortalwrt
          cat logs/*

      - name: 上传固件成品
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-24.10.5-firmware
          path: immortalwrt/bin/targets/
