name: Build ImmortalWrt for Sony VPCX118LC
on:
  workflow_dispatch:  # 手动触发编译

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt  # ImmortalWrt源码地址
  REPO_BRANCH: openwrt-24.10  # 稳定版分支（适配32位，兼容性最好）
  CONFIG_FILE: .config  # 引用当前仓库的专用配置文件
  TARGET: x86  # 32位x86平台
  SUBTARGET: generic  # 32位x86通用子平台
  ROOTFS_PARTSIZE: 512  # 固件大小512MB（足够使用，匹配机型内存）
  UPLOAD_BINARIES: true  # 上传二进制文件
  UPLOAD_FIRMWARE: true  # 上传固件
  UPLOAD_RELEASE: true  # 上传到Releases（方便下载）
  TZ: Asia/Shanghai  # 时区（避免编译报错）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone source code
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH immortalwrt
          cd immortalwrt
          ln -sf ../../.config .config

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build firmware
        run: |
          cd immortalwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware to Releases
        uses: softprops/action-gh-release@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: ImmortalWrt-${{ env.REPO_BRANCH }}-$(date +%Y%m%d)
          files: |
            immortalwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.img.gz
            immortalwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.tar.gz
          body: |
            适配索尼VPCX118LC（32位Atom Z540）的ImmortalWrt固件
            - 固件分支：${{ env.REPO_BRANCH }}
            - 编译时间：$(date +%Y-%m-%d %H:%M:%S)
            - 适配：BIOS启动、有线/无线网卡、USB2.0
            - 默认IP：192.168.1.1  密码：password
